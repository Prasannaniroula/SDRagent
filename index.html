<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h1>Registration Form</h1>
        <label>Full Name:</label>
        <input type="text" name="name"><br>
        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male">Male
        <input type="radio" name="gender" value="Female">Female
        <input type="radio" name="gender" value="Female">Other<br>
        <label>Hobby:</label><br>
        <input type="checkbox" name="Hobby" value="Dancing">Dancing<br>
        <input type="checkbox" name="Hobby" value="Singing">Singing<br>
        <input type="checkbox" name="Hobby" value="Reading">Reading<br><br>
        <label>E-mail:</label>
        <input type="email" name="email"><br><br>
        <label>Password:</label>
        <input type="email" name="email"><br><br>
        <input type="submit">
        <button type="reset">Cancel</button>
    </form>
</body>
</html>
